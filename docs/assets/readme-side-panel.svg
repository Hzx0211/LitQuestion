<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="panel" x1="220" y1="118" x2="1180" y2="782" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FCFAF6"/>
      <stop offset="1" stop-color="#F4EFE8"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F4D5C0"/>
      <stop offset="1" stop-color="#D97B46"/>
    </linearGradient>
    <filter id="shadow" x="160" y="78" width="1080" height="744" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="18"/>
      <feGaussianBlur stdDeviation="24"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.2 0 0 0 0 0.16 0 0 0 0 0.14 0 0 0 0.14 0"/>
    </filter>
  </defs>

  <rect width="1400" height="900" fill="#F7F4EE"/>
  <circle cx="1260" cy="170" r="120" fill="#EFE0D3"/>
  <circle cx="180" cy="710" r="120" fill="#EEE5D8"/>

  <g filter="url(#shadow)">
    <rect x="220" y="118" width="960" height="646" rx="34" fill="url(#panel)"/>
  </g>

  <rect x="220" y="118" width="960" height="646" rx="34" stroke="#E6DED5"/>
  <rect x="220" y="118" width="960" height="74" rx="34" fill="#FBF8F3"/>
  <circle cx="272" cy="156" r="8" fill="#E8C8B2"/>
