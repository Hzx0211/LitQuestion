  <rect x="400" y="430" width="360" height="150" rx="26" fill="#FDEEE0" stroke="#F0D5BF"/>
  <rect x="298" y="612" width="388" height="70" rx="20" fill="#FFFFFF" stroke="#ECE7DF"/>

  <text x="330" y="350" font-family="Inter, Arial, sans-serif" font-size="15" fill="#57514B">A valuable answer appears in the main thread.</text>
  <text x="432" y="472" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="800" fill="#6D4124">This is the one you want to preserve.</text>
  <text x="432" y="506" font-family="Inter, Arial, sans-serif" font-size="15" fill="#7C5A44">It stays highlighted and easy to revisit.</text>
  <text x="330" y="651" font-family="Inter, Arial, sans-serif" font-size="15" fill="#57514B">The main context stays focused and readable.</text>

  <rect x="844" y="236" width="296" height="474" rx="28" fill="#FAFAF7" stroke="#ECE7DF"/>
  <text x="878" y="278" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" fill="#2F2B28">Side panel</text>

  <rect x="878" y="320" width="228" height="72" rx="18" fill="#FFFFFF" stroke="#ECE7DF"/>
  <rect x="910" y="420" width="196" height="112" rx="22" fill="#FFF6EF" stroke="#E8D5C6"/>
  <rect x="878" y="564" width="228" height="84" rx="20" fill="#FFFFFF" stroke="#ECE7DF"/>

  <text x="902" y="363" font-family="Inter, Arial, sans-serif" font-size="15" fill="#57514B">What does this term mean?</text>
  <text x="934" y="456" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800" fill="#6D4124">A quick side question lives here.</text>
  <text x="934" y="488" font-family="Inter, Arial, sans-serif" font-size="14" fill="#7C5A44">Useful for tiny clarifications and small detours.</text>
  <text x="902" y="612" font-family="Inter, Arial, sans-serif" font-size="15" fill="#57514B">Merge it back only if it actually matters.</text>

  <path d="M790 505C824 505 836 505 844 505" stroke="#D5A07B" stroke-width="4" stroke-linecap="round" stroke-dasharray="10 10"/>
  <circle cx="816" cy="505" r="12" fill="url(#warm)"/>

  <rect x="286" y="88" width="160" height="34" rx="17" fill="#F7E8DF"/>
  <rect x="462" y="88" width="174" height="34" rx="17" fill="#EFE7DE"/>
  <rect x="652" y="88" width="192" height="34" rx="17" fill="#F7E8DF"/>
  <text x="366" y="109" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#8A5738">highlight</text>
  <text x="549" y="109" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#736A61">branch quietly</text>
  <text x="748" y="109" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#8A5738">merge back on purpose</text>

  <text x="220" y="56" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="800" fill="#2E2A27">A small question does not need to derail the main answer.</text>
  <text x="220" y="792" font-family="Inter, Arial, sans-serif" font-size="22" fill="#8C5E40">LitQuestion keeps the main note clean while giving side questions a real place to live.</text>
